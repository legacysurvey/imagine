[uwsgi]
#plugins = python

buffer-size = 32768

socket = 0.0.0.0:3032
chdir = /app/viewer
wsgi-file = wsgi.py
processes = 16
threads = 4
stats = 127.0.0.1:1717
# pythonpath = ..
# enable-threads = true
# virtualenv = ...
uid = www-data
gid = www-data
# kill worker threads block for more than this many seconds
harakiri = 300
# logto = /logs
# default is like
#log-format = [pid: %(pid)|app: -|req: -/-] %(addr) (%(user)) {%(vars) vars in %(pktsize) bytes} [%(ctime)] %(method) %(uri) => generated %(rsize) bytes in %(msecs) msecs (%(proto) %(status)) %(headers) headers in %(hsize) bytes (%(switches) switches on core %(core))
log-format = [%(ctime)] %(method) %(status) %(rsize) bytes %(secs) sec %(uri)
